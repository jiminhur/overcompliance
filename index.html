<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terms and Conditions</title>

<!-- Bodoni 느낌 폰트 -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-text">
    TERMS AND CONDITIONS<br>
    <span>A collection of everyday commands</span>
  </div>
</div>

<!-- TITLE -->
<div id="topTitle">TERMS AND CONDITIONS</div>

<!-- CLOCK -->
<div id="clock">
  <div class="hand blue"></div>
  <div class="hand yellow"></div>

  <div class="label all">ALL</div>
  <div class="label executing">EXECUTING</div>
  <div class="label aligning">ALIGNING</div>
  <div class="label suppressing">SUPPRESSING</div>
  <div class="label waiting">WAITING</div>
  <div class="label drifting">DRIFTING</div>
</div>

<!-- GRID -->
<div id="grid"></div>

<!-- SIDE CAM -->
<div class="side left"></div>
<div class="side right"></div>

<!-- COMMAND -->
<div id="commands"></div>

<!-- CUBE POPUP -->
<div id="viewer">
  <video src="video.mp4" autoplay loop muted></video>
</div>

<!-- END -->
<div id="ending">
  <video src="video.mp4" autoplay loop muted></video>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
